[package]
name = "rust-core"
version = "0.1.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
# name = "_rust_core"
crate-type = ["cdylib", "rlib"]


[dependencies]
pyo3 = "0.27.0"
timed = "0.2.1"
pyo3-stub-gen = "0.21.0"
bit-set = "0.10"
num-traits = "0.2"
rkyv = "0.8.15"
itertools = "0.14.0"
inherent = "1.0.13"
